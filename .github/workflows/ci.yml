name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_runtime_ui_smoke:
        description: "Run runtime UI smoke on a self-hosted macOS runner"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  unit-and-build:
    name: Unit and Build Contour
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Swift package clean
        run: swift package clean

      - name: Swift test
        run: swift test

      - name: Verify macOS app build contour
        run: bash Scripts/verify_macos_app_build_contour.sh

      - name: Package release app artifact
        run: |
          test -d release/Smeta.app
          mkdir -p release/dist
          ditto -c -k --sequesterRsrc --keepParent release/Smeta.app release/dist/Smeta.app.zip

      - name: Generate build manifest
        run: |
          ZIP_PATH="release/dist/Smeta.app.zip"
          MANIFEST_PATH="release/dist/build-manifest.txt"
          ZIP_SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          ZIP_SIZE_BYTES="$(wc -c < "$ZIP_PATH" | tr -d ' ')"
          BUILD_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          XCODE_VERSION="$(xcodebuild -version | tr '\n' ';' | sed 's/;$//')"
          SWIFT_VERSION="$(swift --version | head -n 1)"
          GIT_BRANCH_RESOLVED="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          printf '%s\n' \
            "repository=${GITHUB_REPOSITORY}" \
            "git_commit_sha=${GITHUB_SHA}" \
            "git_ref=${GITHUB_REF}" \
            "git_ref_name=${GITHUB_REF_NAME}" \
            "git_head_ref=${GITHUB_HEAD_REF}" \
            "git_branch_resolved=${GIT_BRANCH_RESOLVED}" \
            "build_utc=${BUILD_UTC}" \
            "xcode_version=${XCODE_VERSION}" \
            "swift_version=${SWIFT_VERSION}" \
            "archive_path=${ZIP_PATH}" \
            "archive_name=Smeta.app.zip" \
            "archive_sha256=${ZIP_SHA256}" \
            "archive_size_bytes=${ZIP_SIZE_BYTES}" \
            "runner_os=${RUNNER_OS}" \
            "runner_environment=github-hosted" \
            > "$MANIFEST_PATH"

      - name: Upload unit/build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-and-build-diagnostics
          if-no-files-found: ignore
          path: |
            release/build-logs/**
            .build/**/TestResults*
            release/contour-logs/**
            release/**/contour*.log
            release/**/*contour*.log

      - name: Upload release app artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smeta-release-app
          if-no-files-found: error
          path: |
            release/dist/**

  runtime-ui-smoke:
    name: Runtime UI Smoke (self-hosted macOS)
    runs-on: [self-hosted, macOS]
    needs: unit-and-build
    if: github.event_name == 'workflow_dispatch' && inputs.run_runtime_ui_smoke == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Verify macOS app build contour
        run: bash Scripts/verify_macos_app_build_contour.sh

      - name: Runtime UI smoke check
        run: SMETA_ENABLE_RUNTIME_UI_SMOKE=1 bash Scripts/macos_smoke_check.sh

      - name: Upload runtime smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-ui-smoke-logs
          if-no-files-found: ignore
          path: |
            release/smoke-logs/**
